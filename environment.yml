name: uniprot-lake
channels:
  - conda-forge
  - bioconda
dependencies:
  - openjdk=17          # Required for Nextflow
  - nextflow            # Pipeline orchestration
  - python>=3.11
  - pigz                # Parallel gzip decompression
  - zstd                # Zstandard compression for intermediate JSONL
  - pyarrow             # Arrow columnar format + Parquet read/write
  - pip
  - pip:
      - duckdb                          # JSON/Parquet engine (Python bindings + C library)
      - orjson                          # Fast JSON serialisation for sorted JSONL
      - ijson                           # Streaming JSON parser
      - zstandard                       # Zstd bindings for test fixtures
      - pytest                          # Test runner
