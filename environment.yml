name: uniprot-lake
channels:
  - conda-forge
  - bioconda
dependencies:
  - openjdk=17          # Required for Nextflow
  - nextflow            # Pipeline orchestration
  - python>=3.11
  - pigz                # Parallel gzip decompression
  - zstd                # Zstandard compression for intermediate JSONL
  - duckdb              # JSON/Parquet transformation engine
  - pyarrow             # Arrow IPC between DuckDB and PyIceberg
  - pip
  - pip:
      - pyiceberg[pyarrow,sql-sqlite]  # Iceberg table format + SQLite catalog
      - duckdb                          # Python bindings
      - orjson                          # Fast JSON serialisation for sorted JSONL
      - ijson                           # Streaming JSON parser
